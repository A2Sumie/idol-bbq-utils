# docker-compose.yaml

services:
  spider:
    # 使用官方最新镜像
    #image: ghcr.io/idol-bbq-utils/idol-bbq-utils:canary-fix_conversation-tweet
    #image: ghcr.io/idol-bbq-utils/idol-bbq-utils:latest
    build:
      context: .
      dockerfile: app/tweet-forwarder/Dockerfile
      args:
        BUILD_COMMIT: ${IDOL_BBQ_BUILD_COMMIT:-unknown}
        BUILD_DATE: ${IDOL_BBQ_BUILD_DATE:-unknown}
    # 为您的容器命名
    container_name: 'forwarder-new'
    # 直接使用主机的网络，完美解决访问主机 127.0.0.1 的问题
    network_mode: 'host'
    # Pass the host GPU through so Chrome renders with the real AMD driver (WebGL fingerprint
    # matches the machine instead of SwiftShader). The container user also needs the host
    # video/render groups to open the DRI nodes.
    devices:
      - '/dev/dri:/dev/dri'
    group_add:
      - '44'
      - '105'
    # Default to no restart/offline so a plain compose up cannot activate production.
    restart: '${IDOL_BBQ_RESTART_POLICY:-no}'
    # Runtime shutdown waits up to 30s for active schedulers before forced teardown.
    # Keep Docker's grace period longer so active crawls are not SIGKILLed mid-cleanup.
    stop_grace_period: '90s'
    environment:
      # 设置时区为东京时间，您可以根据需要修改
      - TZ=Asia/Tokyo
      # 设置日志级别
      - LOG_LEVEL=info
      # Set IDOL_BBQ_RUNTIME_MODE=online explicitly when production start is intended.
      - IDOL_BBQ_RUNTIME_MODE=${IDOL_BBQ_RUNTIME_MODE:-offline}
      # Set to blocked for online smoke trials that must not call external send APIs.
      - IDOL_BBQ_OUTBOUND_SEND_MODE=${IDOL_BBQ_OUTBOUND_SEND_MODE:-live}
      # Optional internal receiver/sink for IDOL_BBQ_OUTBOUND_SEND_MODE=capture.
      - IDOL_BBQ_OUTBOUND_CAPTURE_URL=${IDOL_BBQ_OUTBOUND_CAPTURE_URL:-}
      - IDOL_BBQ_OUTBOUND_CAPTURE_FILE=${IDOL_BBQ_OUTBOUND_CAPTURE_FILE:-}
      # Store migration backups on the persistent host assets/backups mount.
      - IDOL_BBQ_DB_BACKUP_DIR=${IDOL_BBQ_DB_BACKUP_DIR:-/app/backups/db-migrations}
      # Optional LLM keys for on-demand translated summary cards.
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY:-}
      - TENCENT_HUNYUAN_API_KEY=${TENCENT_HUNYUAN_API_KEY:-}
      # Hunyuan (hy3) circuit breaker tuning (defaults: threshold=10, no auto-unfreeze).
      - HY3_FAILURE_THRESHOLD=${HY3_FAILURE_THRESHOLD:-}
      - HY3_FREEZE_DURATION_MS=${HY3_FREEZE_DURATION_MS:-}
      # Optional host-side Codex MCP bridge. OpenCode Go is only a DeepSeek API provider;
      # this bridge is the idol-bbq -> MCP -> Codex path.
      - IDOL_BBQ_CODEX_MCP_ENABLED=${IDOL_BBQ_CODEX_MCP_ENABLED:-0}
      - IDOL_BBQ_CODEX_MCP_BRIDGE_URL=${IDOL_BBQ_CODEX_MCP_BRIDGE_URL:-}
      - IDOL_BBQ_CODEX_MCP_BRIDGE_TOKEN=${IDOL_BBQ_CODEX_MCP_BRIDGE_TOKEN:-}
      # Extra Chrome CLI flags (space-separated). Default: force ANGLE GL onto real Mesa
      # (llvmpipe) instead of the SwiftShader headless marker device; RADV is too old for
      # Chrome 142 and hangs the GPU process, so Vulkan stays disabled.
      - BROWSER_EXTRA_ARGS=${BROWSER_EXTRA_ARGS:---ignore-gpu-blocklist --disable-features=Vulkan}
      # Optional live-player schedule webhook sink for extracted time-event candidates.
      - LIVE_PLAYER_SCHEDULE_WEBHOOK_URL=${LIVE_PLAYER_SCHEDULE_WEBHOOK_URL:-}
      - LIVE_PLAYER_SCHEDULE_WEBHOOK_API_KEY=${LIVE_PLAYER_SCHEDULE_WEBHOOK_API_KEY:-}
      - LIVE_PLAYER_SCHEDULE_WEBHOOK_USER_AGENT=${LIVE_PLAYER_SCHEDULE_WEBHOOK_USER_AGENT:-N2NJ-Stream-Bot/1.0}
      - LIVE_PLAYER_SCHEDULE_WAF_BYPASS_HEADER=${LIVE_PLAYER_SCHEDULE_WAF_BYPASS_HEADER:-}
      # TV 存档上传单独走天津风 biliup cookies，不影响其他 bilibili 任务
      - ARCHIVE_UPLOAD_COOKIE_SOURCE=/app/assets/cookies/biliup.tianjinfeng.cookies.json
    volumes:
      # --- 以下是文件挂载，将主机文件映射到容器内部 ---
      # 1. 挂载配置文件
      - './assets/config.yaml:/app/config.yaml'
      # 2. 挂载数据库文件
      - './assets/refactor.db:/app/data.db'
      # 3. 挂载 cookies 文件夹 (注意：只挂载子目录以保留容器内的字体文件)
      - './assets/cookies:/app/assets/cookies'
      # 4. 挂载日志目录
      - '/tmp/tweet-forwarder/logs:/tmp/tweet-forwarder/logs'
      # 5. 挂载媒体文件临时目录
      - '/tmp/tweet-forwarder/media:/tmp/tweet-forwarder/media'
      # 6. 挂载 Instagram live relay 缓存目录
      - '/tmp/tweet-forwarder/instagram-live:/tmp/tweet-forwarder/instagram-live'
      # 7. 挂载数据库迁移/运行时备份目录
      - './assets/backups:/app/backups'
      # 8. 挂载宿主机字体（只读），浏览器字体指纹与真实机器一致
      - '/usr/share/fonts:/usr/share/fonts:ro'
      - '/var/cache/fontconfig:/var/cache/fontconfig:ro'
